version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      # One weekly PR for all non-major Go module bumps. Major bumps stay
      # ungrouped so they still get an individual PR + human review (pkg/* is
      # a semver-public library contract — see CLAUDE.md).
      gomod:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      # One weekly PR for all non-major GitHub Actions bumps.
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
